# Workflow para desplegar React/Vite en GitHub Pages
name: Deploy static content to Pages

on:
  # Se ejecuta al hacer push en master
  push:
    branches: ["master"]

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      # 1. Prepara Node.js (necesario para React/Vite)
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          
      # 2. Instala las dependencias del package.json
      - name: Install dependencies
        run: npm ci
        
      # 3. Compila el código de React a una carpeta de producción
      - name: Build project
        run: npm run build
        
      - name: Setup Pages
        uses: actions/configure-pages@v5
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # IMPORTANTE: Subimos la carpeta 'dist' (donde queda el proyecto compilado) en lugar de '.'
          path: './dist'
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
